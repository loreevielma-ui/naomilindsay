<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Times New Roman", serif;
}

body {
  background: black;
}

/* SECCIONES */
section {
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* VIDEO */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OVERLAY */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 10;
}

#pergamino {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

#texto {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 24px;
  color: white;
}

/* BOTONES */
.botones {
  position: absolute;
  top: 53%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.btn {
  width: 260px;
  background: linear-gradient(145deg, #d4af37, #a67c00);
  color: white;
  padding: 16px;
  border-radius: 14px;
  text-decoration: none;
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<audio id="musica" src="musica.mp3" preload="auto" loop playsinline></audio>

<div id="overlay">
  <img src="pergamino.png" id="pergamino">
  <div id="texto">Abrir pergamino</div>
</div>

<!-- SECCIÓN 1 -->
<section>
  <video id="video1" playsinline muted autoplay preload="auto"></video>
</section>

<!-- SECCIÓN 2 -->
<section>
  <video class="video" data-src="video2.mp4" playsinline muted autoplay preload="auto"></video>
</section>

<!-- SECCIÓN 3 -->
<section>
  <video class="video" data-src="video3.mp4" playsinline muted autoplay preload="auto"></video>
</section>

<!-- SECCIÓN 4 -->
<section>
  <video class="video" data-src="video4.mp4" playsinline muted autoplay preload="auto"></video>
</section>

<!-- SECCIÓN 5 -->
<section>
  <video class="video" data-src="video5.mp4" playsinline muted autoplay preload="auto"></video>

  <div class="botones">
    <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLSe7dtHRVlxm96T_Mp7DzM_itN5ZcR5NpoI8_ZHkle4nwvBiAA/viewform?usp=send_form" target="_blank">
      ✅ Confirmar asistencia
    </a>

    <a class="btn" href="https://www.google.com/search?q=LOCAL+CAMPESTRE+MONTECARLO" target="_blank">
      📍 Ver ubicación
    </a>
  </div>
</section>

<script>
const pergamino = document.getElementById("pergamino");
const overlay = document.getElementById("overlay");
const musica = document.getElementById("musica");

const video1 = document.getElementById("video1");
const videos = document.querySelectorAll("video");

let currentVideo = null;
let played = new Set();

// 🔥 preparar video para iPhone
function prepareVideo(video){
  video.muted = true;
  video.setAttribute("muted", "");
  video.setAttribute("playsinline", "");
  video.setAttribute("autoplay", "");
}

// cargar video
function loadVideo(video) {
  if (video.dataset.src && !video.src) {
    video.src = video.dataset.src;
  }
  prepareVideo(video);
}

// reproducir controlado
function playVideo(video) {

  if (currentVideo && currentVideo !== video) {
    currentVideo.pause();
  }

  currentVideo = video;

  if (played.has(video)) return;

  loadVideo(video);

  video.play().catch(()=>{});
}

// CLICK INICIAL
pergamino.addEventListener("click", () => {
  overlay.style.display = "none";

  musica.play().catch(()=>{});

  video1.src = "pergamino.mp4";
  prepareVideo(video1);
  playVideo(video1);
});

// OBSERVER
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    const video = entry.target;

    if (entry.isIntersecting) {
      playVideo(video);
    }
  });
}, { threshold: 0.6 });

// iniciar observer
videos.forEach(video => {
  prepareVideo(video);

  observer.observe(video);

  video.addEventListener("ended", () => {
    played.add(video);
  });
});
</script>

</body>
</html>
